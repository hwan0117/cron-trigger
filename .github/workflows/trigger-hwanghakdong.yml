name: 황학동 뉴스 봇 트리거

on:
  schedule:
    - cron: '0 4 * * *'  # 매일 04:00 UTC = 한국시간 오후 1시
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 황학동 뉴스 봇 실행 요청
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/hwan0117/---/actions/workflows/daily-news.yml/dispatches \
            -d '{"ref":"master"}' \
            -w "\nHTTP status: %{http_code}\n"
