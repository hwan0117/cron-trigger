name: 키워드 모니터 트리거

on:
  schedule:
    - cron: '0 23 * * 0'  # 월요일 08:00 KST (UTC 일요일 23:00)
    - cron: '0 8 * * 5'   # 금요일 17:00 KST (UTC 금요일 08:00)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 키워드 모니터 실행 요청
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/hwan0117/---/actions/workflows/monitor.yml/dispatches \
            -d '{"ref":"master"}' \
            -w "\nHTTP status: %{http_code}\n"
